# ============================================================================
# Ollama Host-Service — Separat verwaltet
# ============================================================================
# Läuft als systemd-Service auf dem Host (Port 11434).
# Hauptverbraucher von eGPU-VRAM:
#   - qwen3:14b (Standardmodell): ~8–10 GB VRAM
#   - qwen2.5:1.5b (flowinvoice Fallback): ~1.5 GB VRAM
#   - llama3:8b: ~5 GB VRAM
#
# Konfiguration über [ollama]-Block in config.toml (Spezifikation 5.5).
# GPU-UUID der eGPU: GPU-bd7dd984-fd6a-3d83-a22c-539b5b438290

