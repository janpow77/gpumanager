# ============================================================================
# ZUSAMMENFASSUNG
# ============================================================================
#
# Aktive GPU-Pipelines:         3
#   1. audit_designer_celery_worker  (Prio 1, ~7 GB, OCR+Embeddings, Dauerbetrieb)
#   2. audit_designer_jupyter        (Prio 2, ~4 GB, Interaktiv, nur lokal)
#   3. flowinvoice_worker            (Prio 4, ~5.5 GB, OCR+LLM, bei Bedarf Prio 1)
#
# Ollama Host-Service:          1
#   - Verwaltet über [ollama]-Block
#   - VRAM: variabel (1.5–10 GB je nach Modell)
#
# Kein GPU-Bedarf:              2
#   - Workshop (CPU-only)
#   - hpp (keine Pipeline)
#
# ============================================================================
# BETRIEBSMODI
# ============================================================================
#
# MODUS 1 — Nur interne GPU (eGPU nicht angeschlossen = Normalbetrieb):
#
#   RTX 5060 Ti: ~7.800 MB verfügbar (abzgl. Display)
#
#   - audit_designer_celery_worker: 7.168 MB → passt knapp
#   - audit_designer_jupyter: 4.096 MB → nur wenn Worker idle
#   - flowinvoice_worker: 5.632 MB → nur wenn audit_designer nicht aktiv
#   - Ollama: downgrade auf qwen3:8b (~5–6 GB) statt qwen3:14b (~10 GB)
#     qwen3:14b passt nicht auf 8 GB, qwen3:8b schon
#
#   → Ein Worker + Ollama (klein) gleichzeitig auf interner GPU
#   → Scheduler wechselt zwischen Workloads nach Priorität
#   → Das ist NORMALBETRIEB, kein Fehlerzustand
#
# MODUS 2 — Interne GPU + eGPU (eGPU angeschlossen = erweitert):
#
#   RTX 5070 Ti: 16.303 MB verfügbar (kein Display)
#   RTX 5060 Ti: ~7.800 MB verfügbar
#
#   Normalbetrieb:
#   - eGPU: celery_worker (7 GB) + Ollama qwen3:14b (10 GB) → passt knapp
#     ODER celery_worker (7 GB) + jupyter (4 GB) = 11 GB → passt
#   - Interne: flowinvoice (5.5 GB) → wenn aktiv
#
#   flowinvoice-Termin (Prio 1):
#   - eGPU: flowinvoice (5.5 GB) + celery_worker (7 GB) = 12.5 GB → passt
#   - Interne: jupyter (4 GB) + Ollama klein (1.5 GB) → passt
#
# MODUS 3 — Alles + Remote-LanGPU (zusätzlicher Boost):
#
#   RTX 5060 (Remote): 16 GB, nur für LLM und Embeddings (kein CUDA)
#
#   - Ollama qwen3:14b kann auf Remote laufen → eGPU frei für Worker
#   - Embeddings können remote laufen → mehr VRAM lokal
#   - OCR bleibt immer lokal (braucht CUDA)
#
# ============================================================================
# OLLAMA-MODELL-DOWNGRADE BEI ABWESENHEIT DER eGPU
# ============================================================================
#
# Der [ollama]-Block in config.toml muss ein Modell-Downgrade-Mapping enthalten:
#
#   [ollama.model_tiers]
#   # Wenn eGPU verfügbar: volles Modell
#   egpu_available = "qwen3:14b"        # ~10 GB VRAM, volle Leistung
#   # Wenn nur interne GPU: größtes qwen3 das auf 8 GB passt
#   internal_only = "qwen3:8b"          # ~5–6 GB VRAM (Q4), lässt ~2 GB Headroom
#   # Wenn gar keine GPU: kleinstes Modell
#   cpu_only = "qwen3:1.7b"             # ~1.5 GB VRAM (oder CPU-Modus)
#
# Der Daemon wechselt das Modell automatisch über die Ollama-API
# wenn sich die GPU-Verfügbarkeit ändert (eGPU an/ab).
#
# ============================================================================
# HANDLUNGSBEDARF
# ============================================================================
#
# 1. flowinvoice docker-compose.yml: CUDA_VISIBLE_DEVICES=0 durch
#    NVIDIA_VISIBLE_DEVICES=GPU-bd7dd984-... ersetzen
# 2. audit_designer Jupyter: Dockerfile.gpu für Jupyter erstellen,
#    docker-compose.gpu.yml um Jupyter-Service erweitern
# 3. Ollama model_tiers in config.toml konfigurieren
